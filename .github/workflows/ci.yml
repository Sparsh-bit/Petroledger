name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint + compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Byte-compile app
        run: uv run python -m compileall app

      - name: Smoke import
        run: uv run python -c "from app.main import app; print('routes:', len(app.routes))"

      - name: Run tests (if any)
        run: |
          if [ -d tests ] && [ "$(ls -A tests)" ]; then
            uv run pytest -q || exit $?
          else
            echo "No tests directory — skipping."
          fi

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build
