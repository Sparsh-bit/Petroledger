# ── PetroLedger E2E Test Configuration ──────────────────────────────────
# All values can be overridden via -D system properties or env vars.

# Frontend URL
base.url=http://localhost:5173

# Backend API URL
api.url=http://localhost:8000

# Browser: chrome | firefox | edge
browser=chrome

# Headless mode (true in CI, false for local debugging)
headless=false

# Implicit wait timeout in seconds
implicit.wait=10

# Explicit wait timeout in seconds
explicit.wait=15

# Page load timeout in seconds
page.load.timeout=30

# Screenshot directory (relative to project root)
screenshot.dir=target/screenshots

